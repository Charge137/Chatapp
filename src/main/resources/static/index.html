<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<title>Chat App</title>

<style>
body {
    margin: 0;
    font-family: sans-serif;
    background: #0f1115;
    color: white;
}

#chat {
    display: flex;
    height: 100vh;
}

/* sidebar */
#sidebar {
    width: 220px;
    background: #161a22;
    padding: 10px;
}

.box {
    background: #0f1115;
    padding: 8px;
    margin-bottom: 8px;
    border-radius: 6px;
    font-size: 13px;
}

#sidebar button {
    width: 100%;
    background: #2a2f3a;
    color: white;
    border: none;
    padding: 8px;
    border-radius: 6px;
}

/* main */
#main {
    flex: 1;
    display: flex;
    flex-direction: column;
}

/* search */
#search {
    display: flex;
    padding: 8px;
    background: #161a22;
    gap: 6px;
}

#search input {
    flex: 1;
    padding: 6px;
    border: none;
    border-radius: 6px;
    background: #0f1115;
    color: white;
}

#search button {
    width: 28px;
    height: 28px;
    font-size: 12px;
    background: #2a2f3a;
    border: none;
    border-radius: 6px;
    color: white;
    cursor: pointer;
}

/* messages */
#messages {
    flex: 1;
    overflow-y: auto;
    padding: 10px;
    display: flex;
    flex-direction: column;
    gap: 6px;
}

.msg {
    padding: 8px;
    border-radius: 10px;
    max-width: 60%;
    font-size: 13px;
    cursor: pointer;
}

.me {
    background: #00c853;
    margin-left: auto;
}

.other {
    background: #2a2f3a;
}

.system {
    text-align: center;
    font-size: 11px;
    color: gray;
}

/* input */
#input {
    display: flex;
    padding: 8px;
    background: #161a22;
    gap: 6px;
}

#input input {
    flex: 1;
    padding: 6px;
    border: none;
    border-radius: 6px;
    background: #0f1115;
    color: white;
}

#input button {
    width: auto;
    background: #00c853;
    border: none;
    padding: 8px 12px;
    border-radius: 6px;
}

/* modal */
.modal {
    position: fixed;
    top: 0;
    left: 0;
    width: 100%;
    height: 100%;
    background: rgba(0,0,0,0.6);
    display: none;
    justify-content: center;
    align-items: center;
}

.modalBox {
    background: #161a22;
    padding: 20px;
    border-radius: 8px;
}

/* delete menu */
#deleteMenu {
    position: fixed;
    display: none;
    background: #222;
    padding: 8px;
    border-radius: 6px;
    cursor: pointer;
    z-index: 9999;
}
</style>

</head>
<body>

<div id="chat">

<!-- sidebar -->
<div id="sidebar">
    <div class="box">👤 <span id="name"></span></div>
    <div class="box">🟢 Online</div>
    <button onclick="openModal()">名前変更</button>
</div>

<!-- main -->
<div id="main">

<div id="search">
    <input id="searchBox" placeholder="メッセージ検索">
    <button onclick="clearSearch()">×</button>
</div>

<div id="messages"></div>

<div id="input">
    <input id="msg" placeholder="メッセージ">
    <button onclick="send()">送信</button>
</div>

</div>

</div>

<!-- modal -->
<div class="modal" id="modal">
    <div class="modalBox">
        <input id="newName" placeholder="名前">
        <button onclick="applyName()">OK</button>
    </div>
</div>

<!-- delete menu -->
<div id="deleteMenu">削除</div>

<script>

let ws;
let myName = "";
let msgs = [];
let selectedId = null;

/* 通知許可 */
window.addEventListener("load", () => {
    if ("Notification" in window) {
        Notification.requestPermission();
    }
});

/* start */
function start() {

    document.getElementById("name").innerText = myName;

    ws = new WebSocket("ws://" + location.hostname + ":8080/chat");

    ws.onopen = () => {
        ws.send("join:" + myName);
    };

    ws.onmessage = (e) => {

        let d = e.data;

        /* 🗑 削除 */
        if (d.startsWith("delete:")) {
            let id = d.split(":")[1];
            let el = document.getElementById(id);
            if (el) el.remove();
            return;
        }

        /* system（退出など） */
        if (d.startsWith("system:")) {
            let div = document.createElement("div");
            div.className = "system";
            div.textContent = d.replace("system:", "");
            document.getElementById("messages").appendChild(div);
            return;
        }

        /* message */
        let id = d.split(":")[0];
        let text = d.split(":").slice(1).join(":");

        let div = document.createElement("div");
        div.className = "msg";
        div.id = id;
        div.innerText = text;

        /* 通知（自分以外） */
        if (!text.includes(myName + " :")) {
            if (Notification.permission === "granted") {
                new Notification("新しいメッセージ", {
                    body: text
                });
            }
        }

        if (text.includes(myName + " :")) div.classList.add("me");
        else div.classList.add("other");

        /* 自分だけ削除 */
        div.onclick = (e) => {

            if (!text.includes(myName + " :")) return;

            selectedId = id;

            let menu = document.getElementById("deleteMenu");

            menu.style.display = "block";
            menu.style.left = e.clientX + "px";
            menu.style.top = e.clientY + "px";
        };

        document.getElementById("messages").appendChild(div);
        msgs.push(div);
    };
}

/* send */
function send() {
    let v = document.getElementById("msg").value;
    if (!v || !ws) return;

    ws.send(v);
    document.getElementById("msg").value = "";
}

/* ENTER送信 */
document.getElementById("msg").addEventListener("keydown", (e) => {
    if (e.key === "Enter") send();
});

/* search */
document.getElementById("searchBox").addEventListener("input", function() {

    let k = this.value.toLowerCase();

    msgs.forEach(m => {
        m.style.display = m.innerText.toLowerCase().includes(k)
            ? "flex" : "none";
    });
});

function clearSearch() {
    document.getElementById("searchBox").value = "";
    msgs.forEach(m => m.style.display = "flex");
}

/* delete */
document.getElementById("deleteMenu").onclick = () => {

    if (selectedId) {
        ws.send("delete:" + selectedId);
        selectedId = null;
    }

    document.getElementById("deleteMenu").style.display = "none";
};

/* modal */
function openModal() {
    document.getElementById("modal").style.display = "flex";
    document.getElementById("newName").value = myName;
}

function applyName() {
    myName = document.getElementById("newName").value;

    localStorage.setItem("name", myName);
    document.getElementById("name").innerText = myName;

    ws.send("rename:" + myName);

    document.getElementById("modal").style.display = "none";
}

/* login */
window.onload = () => {
    let saved = localStorage.getItem("name");
    myName = saved ? saved : prompt("名前");
    start();
};

</script>

</body>
</html>
